<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.form-container{
    background:#fff;
    padding:30px;
    width:100%;
    max-width:480px;
    border:2px solid #a855f7;
    border-radius:8px;
}

h2{
    text-align:center;
    color:#a855f7;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:5px;
    border:2px solid #a855f7;
    border-radius:5px;
    box-sizing:border-box;
}

.gender-group{
    display:flex;
    gap:20px;
    margin-bottom:5px;
}

.gender-group label{
    display:flex;
    align-items:center;
    font-weight:normal;
}

button{
    width:100%;
    padding:10px;
    background:#e53935;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#b71c1c;
}

.error{
    color:red;
    font-size:13px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="form-container">

<h2>Student Registration</h2>

<label>Full Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>

<label>Email Address</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>

<label>Phone Number</label>
<input type="tel" id="phone">
<div class="error" id="phoneError"></div>

<label>Gender</label>

<div class="gender-group">
<label><input type="radio" name="gender" value="Male">Male</label>
<label><input type="radio" name="gender" value="Female">Female</label>
<label><input type="radio" name="gender" value="Other">Other</label>
</div>

<div class="error" id="genderError"></div>

<label>Date of Birth</label>
<input type="date" id="dob">
<div class="error" id="dobError"></div>

<label>Department</label>
<select id="department">
<option value="">--Select Department--</option>
<option>CSE</option>
<option>ECE</option>
<option>ME</option>
<option>CE</option>
<option>EE</option>
</select>

<div class="error" id="departmentError"></div>

<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>

<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>

<button onclick="validateForm()">Register</button>

</div>

<script>

function validateForm(){

document.querySelectorAll(".error").forEach(e=>e.innerHTML="");

let valid=true;

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let phone=document.getElementById("phone").value.trim();
let dob=document.getElementById("dob").value;
let department=document.getElementById("department").value;
let password=document.getElementById("password").value;
let confirmPassword=document.getElementById("confirmPassword").value;

let gender=document.querySelector('input[name="gender"]:checked');

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(name==""){
document.getElementById("nameError").innerHTML="Name is required";
valid=false;
}

if(email==""){
document.getElementById("emailError").innerHTML="Email is required";
valid=false;
}
else if(!emailPattern.test(email)){
document.getElementById("emailError").innerHTML="Enter a valid email";
valid=false;
}

if(phone==""){
document.getElementById("phoneError").innerHTML="Phone number is required";
valid=false;
}
else if(phone.length!=10 || isNaN(phone)){
document.getElementById("phoneError").innerHTML="Enter valid 10 digit number";
valid=false;
}

if(!gender){
document.getElementById("genderError").innerHTML="Select gender";
valid=false;
}

if(dob==""){
document.getElementById("dobError").innerHTML="Select date of birth";
valid=false;
}

if(department==""){
document.getElementById("departmentError").innerHTML="Select department";
valid=false;
}

if(password==""){
document.getElementById("passwordError").innerHTML="Password is required";
valid=false;
}

if(confirmPassword==""){
document.getElementById("confirmPasswordError").innerHTML="Confirm password";
valid=false;
}
else if(password!=confirmPassword){
document.getElementById("confirmPasswordError").innerHTML="Passwords do not match";
valid=false;
}

if(valid){
alert("Registration Successful");
}

}

</script>

</body>
</html>
