<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKIT Jaipur - Registration Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    .form-wrapper {
      background: #0f0f3d;
      width: 100%;
      max-width: 480px;
      border-radius: 10px;
      border: 2px solid #3a3aff;
      box-shadow: 0 0 20px rgba(58, 58, 255, 0.4);
      overflow: hidden;
    }

    .form-header {
      background: #1a1a5e;
      padding: 22px;
      text-align: center;
      border-bottom: 2px solid #3a3aff;
    }

    .form-header h1 {
      color: #ffffff;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .form-header p {
      color: #9090ff;
      font-size: 12px;
      margin-top: 4px;
    }

    .form-body {
      padding: 24px;
    }

    /* Photo Upload */
    .photo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      padding: 12px;
      border: 1px dashed #3a3aff;
      border-radius: 8px;
      background: #0a0a2e;
    }

    .photo-preview {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #3a3aff;
      object-fit: cover;
      background: #1a1a5e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-preview span {
      font-size: 28px;
    }

    .photo-info p {
      color: #9090ff;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .upload-btn {
      background: #1a1a5e;
      color: #9090ff;
      border: 1px solid #3a3aff;
      padding: 6px 14px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
      letter-spacing: 0;
      font-weight: normal;
      margin-top: 0;
    }

    .upload-btn:hover {
      background: #3a3aff;
      color: white;
    }

    label {
      display: block;
      font-size: 12px;
      color: #9090ff;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 14px;
      background: #0a0a2e;
      border: 1px solid #3a3aff;
      border-radius: 5px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #7878ff;
      box-shadow: 0 0 6px rgba(120, 120, 255, 0.4);
    }

    input::placeholder { color: #555599; }

    select option { background: #0a0a2e; color: #ffffff; }

    /* Gender Radio */
    .gender-group {
      display: flex;
      gap: 18px;
      margin-bottom: 14px;
    }

    .gender-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #9090ff;
      font-size: 13px;
    }

    .gender-group input[type="radio"] {
      width: auto;
      margin-bottom: 0;
      accent-color: #3a3aff;
    }

    /* Two column row */
    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #3a3aff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .submit-btn:hover { background: #2222dd; }
  </style>
</head>
<body>

  <div class="form-wrapper">

    <div class="form-header">
      <h1>🎓 SKIT JAIPUR</h1>
      <p>Student Registration Form</p>
    </div>

    <div class="form-body">

      <!-- Photo Upload -->
      <div class="photo-section">
        <div class="photo-preview" id="photoPreview">
          <img id="previewImg" src="" alt="Photo">
          <span id="photoIcon">👤</span>
        </div>
        <div class="photo-info">
          <p>Upload your photo</p>
          <input type="file" id="photoInput" accept="image/*" style="display:none">
          <button class="upload-btn" onclick="document.getElementById('photoInput').click()">+ Add Photo</button>
        </div>
      </div>

      <!-- Name -->
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name">

      <!-- Father & Mother -->
      <div class="form-row">
        <div class="form-group">
          <label>Father's Name</label>
          <input type="text" placeholder="Father's name">
        </div>
        <div class="form-group">
          <label>Mother's Name</label>
          <input type="text" placeholder="Mother's name">
        </div>
      </div>

      <!-- Gender -->
      <label>Gender</label>
      <div class="gender-group">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
        <label><input type="radio" name="gender" value="other"> Other</label>
      </div>

      <!-- Phone & DOB -->
      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="Phone number">
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date">
        </div>
      </div>

      <!-- Department -->
      <label>Department</label>
      <select>
        <option value="">-- Select Department --</option>
        <option>Computer Science</option>
        <option>Electronics & Communication</option>
        <option>Mechanical Engineering</option>
        <option>Civil Engineering</option>
      </select>

      <!-- Address -->
      <label>Address</label>
      <input type="text" placeholder="Enter your address">

      <!-- Registration Number -->
      <label>Registration Number</label>
      <input type="text" placeholder="Enter registration number">

      <!-- Submit -->
      <button class="submit-btn">Submit</button>

    </div>
  </div>

  <script>
    // Photo preview
    document.getElementById('photoInput').addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById('previewImg').src = e.target.result;
          document.getElementById('previewImg').style.display = 'block';
          document.getElementById('photoIcon').style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
